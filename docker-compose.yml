version: '3.8'

services:
  youtube-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: youtube-media-processor
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - DOWNLOAD_DIR=/app/downloads
    volumes:
      # Monta volume persistente para downloads
      - downloads_data:/app/downloads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  downloads_data:
    driver: local
